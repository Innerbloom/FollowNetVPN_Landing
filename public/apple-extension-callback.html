<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FollowNet — Sign in with Apple</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #242424;
        color: #fff;
      }
      p { opacity: 0.8; font-size: 14px; }
      .err { color: #ffb4b0; max-width: 320px; text-align: center; line-height: 1.4; }
    </style>
  </head>
  <body>
    <p id="msg">Signing in to FollowNet…</p>
    <script>
      (function () {
        var msg = document.getElementById('msg');
        function fail(text) {
          msg.className = 'err';
          msg.textContent = text;
        }
        try {
          var hash = location.hash.charAt(0) === '#' ? location.hash.slice(1) : location.hash;
          var params = new URLSearchParams(hash || location.search.slice(1));
          var idToken = params.get('id_token');
          var stateRaw = params.get('state');
          if (!idToken || !stateRaw) {
            fail('Apple did not return a token. Close this tab and try again in the extension.');
            return;
          }
          var stateJson = atob(stateRaw.replace(/-/g, '+').replace(/_/g, '/'));
          var state = JSON.parse(stateJson);
          var extRedirect = state && state.r;
          if (
            typeof extRedirect !== 'string' ||
            !/^https:\/\/[a-p]{32}\.chromiumapp\.org\/$/.test(extRedirect)
          ) {
            fail('Invalid extension redirect. Update the extension and try again.');
            return;
          }
          var next =
            extRedirect +
            '#id_token=' +
            encodeURIComponent(idToken) +
            '&state=' +
            encodeURIComponent(stateRaw);
          location.replace(next);
        } catch (e) {
          fail('Could not complete sign-in. Close this tab and try again.');
        }
      })();
    </script>
  </body>
</html>
