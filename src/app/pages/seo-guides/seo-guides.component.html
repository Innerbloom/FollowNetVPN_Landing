<div class="guides">
  <div class="container">
    <h1>{{ i18n.t('SEO_GUIDES_TITLE') }}</h1>
    <p class="lead">{{ i18n.t('SEO_GUIDES_LEAD') }}</p>

    <ul class="guide-list">
      <li *ngFor="let slug of slugs">
        <a [routerLink]="'/' + slug">{{ label(slug) }}</a>
      </li>
    </ul>

    <p class="back">
      <a routerLink="/">{{ i18n.t('SEO_LANDING_BACK_HOME') }}</a>
    </p>
  </div>
</div>
